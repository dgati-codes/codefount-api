# docker-compose.yml — local development stack
# Spring Boot equivalent: running the JAR + a Postgres Docker container side by side

version: "3.9"

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       codefount_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI app ───────────────────────────────────────────────────────────
  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_ENV:              development
      DEBUG:                "true"
      DATABASE_URL:         postgresql+asyncpg://postgres:password@db:5432/codefount_db
      SECRET_KEY:           dev-secret-key-change-in-production
      CORS_ORIGINS:         '["http://localhost:3000","http://localhost:5173"]'
      FIRST_SUPERUSER_EMAIL:    admin@codefount.com
      FIRST_SUPERUSER_PASSWORD: Admin@1234
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             python -m app.db.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # ── pgAdmin (optional — like IntelliJ DB plugin) ─────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@codefount.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - db
    profiles: ["tools"]   # start with: docker compose --profile tools up

volumes:
  pgdata: